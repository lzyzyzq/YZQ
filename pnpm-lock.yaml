# pnpm 锁定文件版本（决定了锁文件的解析规则）
lockfileVersion: '9.0'

# 全局设置
settings:
  autoInstallPeers: true          # 自动安装对等依赖（peer dependencies）
  excludeLinksFromLockfile: false # 不排除符号链接，将其纳入锁文件管理

# 项目导入器（定义了不同工作空间的依赖关系）
importers:

  # 根项目（当前目录）
  .:
    dependencies:                 # 生产环境依赖
      '@iconify/vue':
        specifier: ^5.0.0        # package.json 中声明的版本范围
        version: 5.0.0(vue@3.5.28)  # 实际安装的精确版本（含 peer 依赖信息）
      '@tailwindcss/vite':
        specifier: ^4.2.1
        version: 4.2.1(vite@7.3.1(jiti@2.6.1)(lightningcss@1.31.1)(yaml@2.8.2))
      axios:
        specifier: ^1.13.5
        version: 1.13.5
      marked:
        specifier: ^17.0.3
        version: 17.0.3
      motion-v:
        specifier: ^1.10.3
        version: 1.10.3(@vueuse/core@14.2.1(vue@3.5.28))(vue@3.5.28)
      octokit:
        specifier: ^5.0.5
        version: 5.0.5
      pinia:
        specifier: ^3.0.4
        version: 3.0.4(vue@3.5.28)
      tailwindcss:
        specifier: ^4.2.1
        version: 4.2.1
      vue:
        specifier: ^3.5.25
        version: 3.5.28
      vue-bits:
        specifier: ^1.1.1
        version: 1.1.1(vue@3.5.28)
      vue-router:
        specifier: ^5.0.3
        version: 5.0.3(@vue/compiler-sfc@3.5.28)(pinia@3.0.4(vue@3.5.28))(vue@3.5.28)
    devDependencies:              # 开发环境依赖
      '@tailwindcss/typography':
        specifier: ^0.5.19
        version: 0.5.19(tailwindcss@4.2.1)
      '@vitejs/plugin-vue':
        specifier: ^6.0.2
        version: 6.0.4(vite@7.3.1(jiti@2.6.1)(lightningcss@1.31.1)(yaml@2.8.2))(vue@3.5.28)
      daisyui:
        specifier: ^5.5.19
        version: 5.5.19
      vite:
        specifier: ^7.3.1
        version: 7.3.1(jiti@2.6.1)(lightningcss@1.31.1)(yaml@2.8.2)

# 包信息块（记录每个包的具体版本信息、依赖关系、完整性哈希等）
packages:

  # 示例：@babel/generator 包的信息
  '@babel/generator@7.29.1':
    resolution: {integrity: sha512-...}   # 包的完整性校验哈希（确保下载内容未被篡改）
    engines: {node: '>=6.9.0'}           # 要求 Node.js 版本

  # 此处省略了其余大量包的定义（结构类似，均为各个依赖包的精确信息）
  # ...（由于篇幅限制，未列出所有包，但格式均如上所示）

  # 示例末尾
  webpack-virtual-modules@0.6.2: {}       # 没有额外元数据的空记录

  yaml@2.8.2: {}                          # yaml 包信息