<!doctype html>
<html lang="en" data-theme="">
  <head>
    <meta charset="UTF-8" />                         <!-- 设置字符编码为 UTF-8 -->
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />   <!-- 兼容 IE 浏览器，使用最新渲染模式 -->
    <meta name="referrer" content="same-origin" />    <!-- 控制请求头中的 Referer 信息，仅同源时发送 -->
    <meta name="keywords" content="空空爱追剧的个人博客,空空爱追剧,Web,Blog,Personal blog" />  <!-- 页面关键词，用于 SEO -->
    <meta name="description" content="空空爱追剧的个人博客。友链，资源，论坛，文章，视频各种功能一应俱全！" />   <!-- 页面描述，显示在搜索引擎结果中 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />   <!-- 适配移动端，视口宽度等于设备宽度，初始缩放比例为 1 -->
    <link rel="shortcut icon" href="/img/logo.png" type="image/x-icon" />   <!-- 设置网站图标（favicon） -->
    <title>空空爱追剧的个人博客</title>                <!-- 浏览器标签页显示的标题 -->
  </head>
  <body>
    <div id="app"></div>                             <!-- Vue/React 等前端框架的挂载点 -->
    <script type="module" src="/src/main.js"></script>   <!-- 入口 JavaScript 模块，支持 ES6 模块语法 -->
  </body>
</html>
